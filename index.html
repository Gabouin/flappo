<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Flappo</title>
    <link rel="icon" type="image/png" href="onekey.png">
    <script src="https://cdn.jsdelivr.net/npm/phaser-ce@2.20.0/build/phaser.min.js"></script>
</head>
<body>
<script>
window.onload = function(){
    var game = new Phaser.Game(320, 480, Phaser.CANVAS);
    var bird;
    var birdGravity = 800;
    var birdSpeed = 125;
    var birdFlapPower = 300;
    var pipeDistance = 250;
    var pipeHole = 200;
    var pipeGroup;
    var pipeCount = 0;
    var score = 0;
    var scoreText;
    var topScore;
    var speeds = [
        {label: "SLOW", value: 90},
        {label: "NORMAL", value: 125},
        {label: "FAST", value: 170},
        {label: "SUPER FAST", value: 280}
    ];
    var speedIndex = 1;

    var menu = function(game){};

    menu.prototype = {
        preload: function(){
            game.load.image("bird", "bird.png");
            game.load.image("pipe", "pipe.png");
            game.load.image("pipe_top", "pipe-top.png");
            game.load.image("onekey", "onekey.png");
        },
        create: function(){
            game.stage.backgroundColor = "#87CEEB";
            var title = game.add.text(0, 110, "FLAPP", {font: "bold 48px Arial", fill: "#ffffff"});
            title.anchor.set(0, 0.5);
            var logo = game.add.image(0, 110, "onekey");
            logo.anchor.set(0, 0.5);
            logo.width = 46;
            logo.height = 48;
            title.x = 160 - (title.width + logo.width + 4)/2;
            logo.x = title.x + title.width + 4;
            this.playText = game.add.text(160, 240, "", {font: "bold 24px Arial"});
            this.playText.anchor.set(0.5);
            this.speedText = game.add.text(160, 300, "", {font: "bold 24px Arial"});
            this.speedText.anchor.set(0.5);
            var help = game.add.text(160, 430, "the selection moves by itself\npress O to choose", {font: "14px Arial", align: "center"});
            help.anchor.set(0.5);
            this.selected = 0;
            this.updateTexts();
            game.time.events.loop(1000, this.moveCursor, this);
            this.oKey = game.input.keyboard.addKey(Phaser.Keyboard.O);
            this.oKey.onDown.removeAll();
            this.oKey.onDown.add(this.choose, this);
        },
        moveCursor: function(){
            this.selected = (this.selected+1)%2;
            this.updateTexts();
        },
        updateTexts: function(){
            var speedLabel = "SPEED: "+speeds[speedIndex].label;
            this.playText.text = this.selected===0 ? "> PLAY <" : "PLAY";
            this.playText.fill = this.selected===0 ? "#ffffff" : "#000000";
            this.speedText.text = this.selected===1 ? "> "+speedLabel+" <" : speedLabel;
            this.speedText.fill = this.selected===1 ? "#ffffff" : "#000000";
        },
        choose: function(){
            if(this.selected===0){
                game.state.start("Play");
            } else {
                speedIndex = (speedIndex+1)%speeds.length;
                this.updateTexts();
            }
        },
        shutdown: function(){
            this.oKey.onDown.removeAll();
        }
    };

    var gameOver = function(game){};

    gameOver.prototype = {
        create: function(){
            game.stage.backgroundColor = "#87CEEB";
            var title = game.add.text(160, 150, "GAME OVER", {font: "bold 40px Arial", fill: "#ffffff"});
            title.anchor.set(0.5);
            var best = Math.max(score, topScore);
            var result = game.add.text(160, 250, "Score: "+score+"\nBest: "+best, {font: "bold 24px Arial", align: "center"});
            result.anchor.set(0.5);
            var help = game.add.text(160, 430, "press O for the menu", {font: "14px Arial"});
            help.anchor.set(0.5);
            this.oKey = game.input.keyboard.addKey(Phaser.Keyboard.O);
            this.oKey.onDown.removeAll();
            game.time.events.add(500, function(){
                this.oKey.onDown.add(function(){
                    game.state.start("Menu");
                }, this);
            }, this);
        },
        shutdown: function(){
            this.oKey.onDown.removeAll();
        }
    };

    var play = function(game){};

    play.prototype = {
        preload: function(){
            game.load.image("bird", "bird.png");
            game.load.image("pipe", "pipe.png");
            game.load.image("pipe_top", "pipe-top.png");
        },
        create: function(){
            birdSpeed = speeds[speedIndex].value;
            pipeCount = 0;
            pipeGroup = game.add.group();
            score = 0;
            topScore = localStorage.getItem("topFlappyScore")==null?0:localStorage.getItem("topFlappyScore");
            scoreText = game.add.text(10,10,"-",{
                font:"bold 16px Arial"
            });
            updateScore();
            game.stage.backgroundColor = "#87CEEB";
            game.stage.disableVisibilityChange = true;
            game.physics.startSystem(Phaser.Physics.ARCADE);
            bird = game.add.sprite(80,240,"bird");
            bird.anchor.set(0.5);
            bird.scale.set(0.9);
            game.physics.arcade.enable(bird);
            bird.body.gravity.y = birdGravity;
            var oKey = game.input.keyboard.addKey(Phaser.Keyboard.O);
            oKey.onDown.removeAll();
            oKey.onDown.add(flap, this);
            game.time.events.loop(pipeDistance / birdSpeed * 1000, addPipe);
            addPipe();
        },
        update: function(){
            bird.angle = Phaser.Math.clamp(bird.body.velocity.y * 0.15, -25, 90);
            game.physics.arcade.collide(bird, pipeGroup, die);
            if(bird.y>game.height || bird.y<0){
                die();
            }
        }
    };

    game.state.add("Menu", menu);
    game.state.add("Play", play);
    game.state.add("GameOver", gameOver);
    game.state.start("Menu");

    function updateScore(){
        scoreText.text = "Score: "+score+"\nBest: "+topScore;
    }

    function flap(){
        bird.body.velocity.y = -birdFlapPower;
    }

    function addPipe(){
        pipeCount++;
        var pipeSpeed = -birdSpeed;
        var oscillate = false;
        if(pipeCount % 6 === 3){
            pipeSpeed *= 0.8;
        } else if(pipeCount % 6 === 0){
            oscillate = true;
        }
        var pipeHolePosition = game.rnd.between(50, 430-pipeHole);
        var upperPipe = new Pipe(game, 352, pipeHolePosition-240, pipeSpeed, true);
        upperPipe.oscillate = oscillate;
        game.add.existing(upperPipe);
        pipeGroup.add(upperPipe);
        var lowerPipe = new Pipe(game, 352, pipeHolePosition+pipeHole+240, pipeSpeed);
        lowerPipe.oscillate = oscillate;
        game.add.existing(lowerPipe);
        pipeGroup.add(lowerPipe);
    }

    function die(){
        localStorage.setItem("topFlappyScore", Math.max(score,topScore));
        game.state.start("GameOver");
    }

    var Pipe = function (game, x, y, speed, flipped){
        Phaser.Sprite.call(this, game, x, y, flipped ? "pipe_top" : "pipe");
        this.anchor.set(0.5);
        this.width = 64;
        this.height = 480;
        game.physics.enable(this, Phaser.Physics.ARCADE);
        this.body.velocity.x = speed;
        this.giveScore = true;
        this.baseY = y;
        this.oscillate = false;
    };

    Pipe.prototype = Object.create(Phaser.Sprite.prototype);
    Pipe.prototype.constructor = Pipe;

    Pipe.prototype.update = function() {
        if(this.oscillate){
            this.y = this.baseY + 40*Math.sin(this.game.time.totalElapsedSeconds()*2);
        }
        if(this.x+this.width/2<bird.x && this.giveScore){
            score+=0.5;
            updateScore();
            this.giveScore = false;
        }
        if(this.x<-this.width/2){
            this.destroy();
        }
    };
};
</script>
</body>
</html>
